<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Result Portal — Combined</title>
  <style>
    /* Basic styles inlined from style.css */
    :root{--bg:#f3f6fb;--card:#fff;--accent:#2b6cb0;--muted:#666}
    html,body{height:100%;margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:var(--bg);color:#222}
    .login-card{width:360px;margin:60px auto;padding:24px;background:var(--card);box-shadow:0 6px 18px rgba(20,30,60,.08);border-radius:10px}
    h1{font-size:20px;margin:0 0 16px}
    input{width:100%;padding:10px 12px;margin:8px 0;border:1px solid #e6eef8;border-radius:6px;box-sizing:border-box}
    .password-box{display:flex;gap:8px;align-items:center}
    .password-box input{flex:1;margin:0}
    .password-box button{padding:8px 10px;border-radius:6px;border:1px solid #d0d8e8;background:#f7fbff;cursor:pointer}
    #loginBtn, #logout{background:var(--accent);color:#fff;border:0;padding:10px 14px;border-radius:6px;cursor:pointer}
    #message{color:var(--muted);min-height:18px}
    #loading{display:none;text-align:center;margin-top:12px}
    .loader{width:36px;height:36px;border-radius:50%;border:4px solid rgba(0,0,0,.08);border-top-color:var(--accent);animation:spin 1s linear infinite;margin:10px auto}
    @keyframes spin{to{transform:rotate(360deg)}}
    #dashboard{display:none;max-width:820px;margin:30px auto;padding:20px}
    header{display:flex;justify-content:space-between;align-items:center}
    .viewer{background:#fff;padding:16px;border-radius:8px;margin-top:16px}
    .viewer img{max-width:100%;height:auto;border-radius:4px}
  </style>
</head>
<body>

<div class="login-card" id="loginCard">

  <h1>🎓 Student Result Portal</h1>

  <input id="reg" type="text" placeholder="Register Number" autocomplete="off">

  <div class="password-box">
    <input id="password" type="password" placeholder="Password">
    <button id="toggle">Show</button>
  </div>

  <button id="loginBtn">Login</button>

  <p id="message"></p>

  <div id="loading">
    <div class="loader"></div>
    <p>Fetching Result...</p>
  </div>

</div>

<div id="dashboard">

  <header>
    <h2>Student Result</h2>
    <button id="logout">Logout</button>
  </header>

  <div class="viewer">
    <h3>Your Result Document</h3>
    <img src="F:\\result portal\\result.jpg" alt="Result Document">
  </div>

</div>

<script>
  // Inlined behaviour from script.js — basic login/dashboard toggles
  (function(){
    const reg = document.getElementById('reg');
    const pwd = document.getElementById('password');
    const toggle = document.getElementById('toggle');
    const loginBtn = document.getElementById('loginBtn');
    const message = document.getElementById('message');
    const loading = document.getElementById('loading');
    const loginCard = document.getElementById('loginCard');
    const dashboard = document.getElementById('dashboard');
    const logout = document.getElementById('logout');

    toggle.addEventListener('click', function(){
      if(pwd.type === 'password'){ pwd.type = 'text'; toggle.textContent = 'Hide'; }
      else { pwd.type = 'password'; toggle.textContent = 'Show'; }
    });

    loginBtn.addEventListener('click', function(){
      message.textContent = '';
      const r = reg.value.trim();
      const p = pwd.value.trim();
      if(!r || !p){ message.textContent = 'Enter register number and password'; return; }

      loading.style.display = 'block';
      loginBtn.disabled = true;

      // Simulate fetch — replace with real request if available
      setTimeout(()=>{
        loading.style.display = 'none';
        loginBtn.disabled = false;
        // Simple success: show dashboard
        loginCard.style.display = 'none';
        dashboard.style.display = 'block';
      }, 1200);
    });

    logout.addEventListener('click', function(){
      dashboard.style.display = 'none';
      loginCard.style.display = 'block';
      reg.value = '';
      pwd.value = '';
      message.textContent = '';
    });
  })();
</script>

</body>
</html>
